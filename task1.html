<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 1 - Фотогалерея</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header>
        <h1>Мої Улюблені Місця</h1>
        <p>Галерея з нестандартними формами зображень</p>
    </header>

    <div class="gallery">
        <div class="photo-card">
            <img src="https://picsum.photos/id/10/400/400" alt="Гори" class="shape-circle">
            <p>Гори</p>
        </div>

        <div class="photo-card">
            <img src="https://picsum.photos/id/13/400/400" alt="Океан" class="shape-ellipse">
            <p>Океан</p>
        </div>

        <div class="photo-card">
            <img src="https://picsum.photos/id/16/400/400" alt="Ліс" class="shape-rhombus">
            <p>Ліс</p>
        </div>

        <div class="photo-card">
            <img src="https://picsum.photos/id/19/400/400" alt="Пустеля" class="shape-leaf">
            <p>Пустеля</p>
        </div>
    </div>

</body>
</html>
